<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Cherry Blossom Anime - Interactive Experience</title><link rel="stylesheet" href="style.css"></head><body><div class="container"><div class="background"><canvas id="canvas"></canvas></div><div class="content"><h1 class="title">💕 Cherry Blossom Moments 💕</h1><div class="characters-container"><div class="character left"><div class="character-3d" id="character1">🧑</div><p class="character-name">Sakura</p><p class="character-emotion" id="emotion1">Happy</p></div><div class="heart-animation"><span class="floating-heart">💕</span></div><div class="character right"><div class="character-3d" id="character2">👨</div><p class="character-name">Haru</p><p class="character-emotion" id="emotion2">Joyful</p></div></div><div class="controls"><button class="btn btn-kiss" onclick="interaction('kiss')"><span>💋 Kiss</span></button><button class="btn btn-hug" onclick="interaction('hug')"><span>🤗 Hug</span></button><button class="btn btn-hold" onclick="interaction('hold')"><span>🤝 Hold Hands</span></button><button class="btn btn-dance" onclick="interaction('dance')"><span>💃 Dance</span></button><button class="btn btn-laugh" onclick="interaction('laugh')"><span>😄 Laugh</span></button><button class="btn btn-blush" onclick="interaction('blush')"><span>😳 Blush</span></button></div><div class="info-panel"><p id="info-text">Click any button to interact with the characters! Watch them react.</p></div></div></div><script src="script.js"></script></body></html>
